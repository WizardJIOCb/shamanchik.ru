server {
    listen 80;
    listen [::]:80;
    server_name shamanchik.ru www.shamanchik.ru;

    root /var/www/shamanchik.ru;
    index index.html;

    access_log /var/log/nginx/shamanchik.ru.access.log;
    error_log /var/log/nginx/shamanchik.ru.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name xn--80aayihh4ed.xn--p1ai www.xn--80aayihh4ed.xn--p1ai;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name xn--80aayihh4ed.xn--p1ai www.xn--80aayihh4ed.xn--p1ai;

    root /var/www/shamanchik.ru;
    index index.html;

    access_log /var/log/nginx/shamanchik.ru.access.log;
    error_log /var/log/nginx/shamanchik.ru.error.log;

    ssl_certificate /etc/letsencrypt/live/xn--80aayihh4ed.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--80aayihh4ed.xn--p1ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
